<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOTMATRIX // PRO</title>
    <style>
        :root { --accent: #00ff88; --glass: rgba(15, 15, 15, 0.85); --red: #ff4444; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
              width: 92%; max-width: 550px; z-index: 100; backdrop-filter: blur(15px);
              background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
              border-radius: 16px; padding: 18px; box-sizing: border-box; 
              transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); opacity: 1; }
        
        body.hide-ui #ui { opacity: 0; transform: translate(-50%, 40px); pointer-events: none; }

        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); 
                             margin-bottom: 15px; border-radius: 2px; cursor: pointer; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        .controls { display: flex; flex-direction: column; gap: 15px; color: white; }
        .row { display: flex; align-items: center; justify-content: space-between; }
        .group { display: flex; align-items: center; gap: 8px; }
        
        button { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; 
                 padding: 10px 12px; cursor: pointer; font-size: 10px; border-radius: 6px; 
                 text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; font-weight: 600; }
        button:active { background: rgba(255,255,255,0.2); }
        #recBtn.active { border-color: var(--red); color: var(--red); box-shadow: 0 0 10px rgba(255,68,68,0.3); }

        #init-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 300;
                       background: #000; display: flex; flex-direction: column; align-items: center; 
                       justify-content: center; color: var(--accent); font-family: monospace; cursor: pointer; }
    </style>
</head>
<body class="show-ui">

    <div id="init-overlay" onclick="startSystem()">
        <div style="border: 1px solid var(--accent); padding: 20px; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">▶</div>
        [ BOOT SYSTEM ]
    </div>

    <div id="ui">
        <div class="progress-container" id="scrub-bar"><div id="progress-bar"></div></div>
        <div class="controls">
            <div class="row">
                <div class="group">
                    <button id="playBtn">PLAY</button>
                    <button onclick="skip(-10)">-10</button>
                    <button onclick="skip(10)">+10</button>
                </div>
                <div class="group">
                    <button onclick="toggleFS()">[ ]</button>
                    <button id="recBtn">REC</button>
                </div>
            </div>
            <div class="row" style="border-top: 1px solid rgba(255,255,255,0.05); pt: 10px;">
                <button onclick="toggleMono()" id="mBtn" style="flex:1; margin-right:5px;">MONO: OFF</button>
                <button onclick="document.getElementById('file').click()" style="flex:1; margin-left:5px;">📂 LOAD VIDEO</button>
            </div>
        </div>
        <input type="file" id="file" style="display:none" accept="video/*">
    </div>

    <video id="video" loop playsinline crossorigin="anonymous" style="display:none"></video>
    <canvas id="view"></canvas>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        let scene, camera, renderer, material, mesh, videoTexture, analyser, dataArray, audioCtx;
        let isRecording = false, recorder, chunks = [];
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const recBtn = document.getElementById('recBtn');

        window.startSystem = () => {
            document.getElementById('init-overlay').style.display = 'none';
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const src = audioCtx.createMediaElementSource(video);
                analyser = audioCtx.createAnalyser();
                src.connect(analyser); analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (video.src) video.play();
        };

        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 2.8;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('view'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const geometry = new THREE.PlaneGeometry(5, 3, 240, 240); 
            material = new THREE.ShaderMaterial({
                uniforms: { u_tex: { value: new THREE.Texture() }, u_audio: { value: 0 }, u_mono: { value: 0.0 } },
                vertexShader: `
                    varying vec2 vUv; varying float vB;
                    uniform sampler2D u_tex; uniform float u_audio;
                    void main() {
                        vUv = uv; vec4 t = texture2D(u_tex, uv);
                        vB = (t.r + t.g + t.b) / 3.0;
                        vec3 p = position;
                        p.z += vB * (0.5 + u_audio * 1.2); 
                        gl_PointSize = clamp((vB * 5.5) * (1.0 + u_audio), 1.0, 7.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv; varying float vB;
                    uniform sampler2D u_tex; uniform float u_mono;
                    void main() {
                        if (vB < 0.15) discard;
                        vec4 t = texture2D(u_tex, vUv);
                        if (length(gl_PointCoord - 0.5) > 0.5) discard;
                        vec3 f = (u_mono > 0.5) ? vec3(vB + 0.2) : t.rgb * (vB + 0.3);
                        gl_FragColor = vec4(f, 1.0);
                    }
                `,
                transparent: true
            });

            mesh = new THREE.Points(geometry, material);
            scene.add(mesh);
            loop();
        }

        function handleFile(file) {
            if(!file) return;
            video.src = URL.createObjectURL(file);
            videoTexture = new THREE.VideoTexture(video);
            material.uniforms.u_tex.value = videoTexture;
            if(audioCtx) audioCtx.resume();
            video.play();
        }

        function loop() {
            requestAnimationFrame(loop);
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                material.uniforms.u_audio.value = (dataArray[4] / 255) * 0.6;
            }
            if (!video.paused) {
                document.getElementById('progress-bar').style.width = (video.currentTime / video.duration) * 100 + "%";
            }
            renderer.render(scene, camera);
        }

        // --- FEATURES ---
        window.toggleFS = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        recBtn.onclick = () => {
            if (!isRecording) {
                chunks = [];
                const stream = document.getElementById('view').captureStream(60);
                recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                    a.download = 'Matrix_Render.webm';
                    a.click();
                };
                recorder.start();
                isRecording = true;
                recBtn.innerText = "STOP";
                recBtn.classList.add('active');
            } else {
                recorder.stop();
                isRecording = false;
                recBtn.innerText = "REC";
                recBtn.classList.remove('active');
            }
        };

        let uiTimer;
        const resetUI = () => {
            document.body.classList.remove('hide-ui');
            clearTimeout(uiTimer);
            if(!video.paused) uiTimer = setTimeout(() => document.body.classList.add('hide-ui'), 3000);
        };
        window.addEventListener('touchstart', resetUI);
        window.addEventListener('mousedown', resetUI);
        window.skip = v => video.currentTime += v;
        window.toggleMono = () => {
            material.uniforms.u_mono.value = material.uniforms.u_mono.value ? 0.0 : 1.0;
            document.getElementById('mBtn').innerText = material.uniforms.u_mono.value ? "MONO: ON" : "MONO: OFF";
        };
        playBtn.onclick = () => { video.paused ? video.play() : video.pause(); playBtn.innerText = video.paused ? 'PLAY' : 'PAUSE'; resetUI(); };
        document.getElementById('file').onchange = e => handleFile(e.target.files[0]);
        document.getElementById('scrub-bar').onclick = e => video.currentTime = (e.offsetX / e.target.clientWidth) * video.duration;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setup();
    </script>
</body>
</html>
