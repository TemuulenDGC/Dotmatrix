<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOTMATRIX // REFINED</title>
    <style>
        :root { --accent: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Inter', sans-serif; cursor: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 100; 
              background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 30px 40px; 
              box-sizing: border-box; transition: 0.6s ease; opacity: 1; pointer-events: auto; }
        
        body.hide-ui #ui { opacity: 0; transform: translateY(30px); pointer-events: none; }
        body.show-ui { cursor: default; }

        .progress-container { width: 100%; height: 4px; background: #222; cursor: pointer; margin-bottom: 20px; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; pointer-events: none; }

        .controls { display: flex; align-items: center; justify-content: space-between; color: white; }
        .group { display: flex; align-items: center; gap: 20px; }
        
        button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; 
                 padding: 8px 15px; cursor: pointer; font-size: 13px; border-radius: 4px; transition: 0.2s; font-family: monospace; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        
        #drop-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
                    display: none; background: rgba(0,255,136,0.05); border: 3px dashed var(--accent); 
                    z-index: 200; align-items: center; justify-content: center; color: var(--accent); pointer-events: none; }
    </style>
</head>
<body class="show-ui">

    <div id="drop-zone">DROP_VIDEO_FILE</div>

    <div id="ui">
        <div class="progress-container" id="scrub-bar">
            <div id="progress-bar"></div>
        </div>
        <div class="controls">
            <div class="group">
                <button onclick="skip(-10)">-10S</button>
                <button id="playBtn">PLAY</button>
                <button onclick="skip(10)">+10S</button>
                <div style="font-size:12px; font-family:monospace;"><span id="cur">0:00</span> / <span id="dur">0:00</span></div>
            </div>
            <div class="group">
                <button onclick="toggleMono()" id="monoBtn">MONO: OFF</button>
                <button id="recBtn" style="border-color:#f44; color:#f44;">REC</button>
                <button onclick="document.getElementById('file').click()">📂 LOAD</button>
                <button onclick="toggleFS()">[ ]</button>
            </div>
        </div>
        <input type="file" id="file" style="display:none" accept="video/*">
    </div>

    <video id="video" loop playsinline crossorigin="anonymous" style="display:none"></video>
    <canvas id="view"></canvas>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        let scene, camera, renderer, material, mesh, videoTexture, analyser, dataArray;
        let isMono = false, isRecording = false, recorder, chunks = [];
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');

        // --- 1. UI & DROP LOGIC ---
        const dz = document.getElementById('drop-zone');
        window.addEventListener('dragover', e => { e.preventDefault(); dz.style.display = 'flex'; });
        dz.addEventListener('dragleave', () => dz.style.display = 'none');
        dz.addEventListener('drop', e => { e.preventDefault(); dz.style.display = 'none'; handleFile(e.dataTransfer.files[0]); });

        let idleTimer;
        function resetTimer() {
            document.body.classList.remove('hide-ui');
            document.body.classList.add('show-ui');
            clearTimeout(idleTimer);
            if (!video.paused) idleTimer = setTimeout(() => {
                document.body.classList.add('hide-ui');
                document.body.classList.remove('show-ui');
            }, 2500);
        }
        window.addEventListener('mousemove', resetTimer);

        // --- 2. THE REFINED ENGINE ---
        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 2.4;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('view'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Refined Geometry (400x400 for high detail)
            const geometry = new THREE.PlaneGeometry(5, 3, 400, 400);
            material = new THREE.ShaderMaterial({
                uniforms: { u_tex: { value: new THREE.Texture() }, u_audio: { value: 0 }, u_mono: { value: 0.0 } },
                vertexShader: `
                    varying vec2 vUv;
                    varying float vB;
                    uniform sampler2D u_tex;
                    uniform float u_audio;
                    void main() {
                        vUv = uv;
                        vec4 t = texture2D(u_tex, uv);
                        vB = (t.r + t.g + t.b) / 3.0;
                        vec3 p = position;
                        
                        // REFINED PHYSICS: Reduced push and added subtle wobble
                        p.z += vB * (0.4 + u_audio * 0.8); 
                        
                        // CLAMPED SIZE: Prevents overlapping "blobs"
                        gl_PointSize = clamp((vB * 6.0) * (1.0 + u_audio), 1.0, 10.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    varying float vB;
                    uniform sampler2D u_tex;
                    uniform float u_mono;
                    void main() {
                        if (vB < 0.12) discard; // Cleaner black levels
                        vec4 t = texture2D(u_tex, vUv);
                        if (length(gl_PointCoord - 0.5) > 0.5) discard;
                        vec3 final = (u_mono > 0.5) ? vec3(vB + 0.15) : t.rgb * (vB + 0.2);
                        gl_FragColor = vec4(final, 1.0);
                    }
                `,
                transparent: true
            });

            mesh = new THREE.Points(geometry, material);
            scene.add(mesh);
            loop();
        }

        function handleFile(file) {
            if(!file || !file.type.startsWith('video/')) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaElementSource(video);
            analyser = ctx.createAnalyser();
            src.connect(analyser); analyser.connect(ctx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            video.src = URL.createObjectURL(file);
            video.play();
            videoTexture = new THREE.VideoTexture(video);
            material.uniforms.u_tex.value = videoTexture;
            video.onloadedmetadata = () => document.getElementById('dur').innerText = fmt(video.duration);
        }

        function loop() {
            requestAnimationFrame(loop);
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                // Tracking Mid-Bass for smoother movement
                material.uniforms.u_audio.value = (dataArray[4] / 255) * 0.5;
            }
            if (!video.paused) {
                const p = (video.currentTime / video.duration) * 100;
                document.getElementById('progress-bar').style.width = p + "%";
                document.getElementById('cur').innerText = fmt(video.currentTime);
            }
            renderer.render(scene, camera);
        }

        // --- 3. DOWNLOAD & RECORDING ---
        document.getElementById('recBtn').onclick = function() {
            if (!isRecording) {
                chunks = [];
                const stream = document.getElementById('view').captureStream(60);
                recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                    a.download = 'DotMatrix_Capture.webm';
                    a.click();
                };
                recorder.start();
                this.innerText = "STOP";
                isRecording = true;
            } else {
                recorder.stop();
                this.innerText = "REC";
                isRecording = false;
            }
        };

        const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
        window.toggleMono = () => { isMono = !isMono; material.uniforms.u_mono.value = isMono ? 1.0 : 0.0; document.getElementById('monoBtn').innerText = `MONO: ${isMono ? 'ON' : 'OFF'}`; };
        window.skip = v => video.currentTime += v;
        window.toggleFS = () => document.documentElement.requestFullscreen();
        playBtn.onclick = () => { video.paused ? video.play() : video.pause(); playBtn.innerText = video.paused ? 'PLAY' : 'PAUSE'; resetTimer(); };
        document.getElementById('file').onchange = e => handleFile(e.target.files[0]);
        document.getElementById('scrub-bar').onclick = e => video.currentTime = (e.offsetX / e.target.clientWidth) * video.duration;

        setup();
    </script>
</body>
</html>
